apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: staging
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: YOUR_DOCKERHUB/multi-backend:v1
          ports:
            - containerPort: 5000
          env:
            - name: APP_ENV
              value: "staging"          # staging env variable
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: staging
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 31001                   # staging backend port