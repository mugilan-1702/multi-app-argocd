apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: YOUR_DOCKERHUB/multi-backend:v1
          ports:
            - containerPort: 5000
          env:
            - name: APP_ENV
              value: "production"       # prod env variable
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: production
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 32001                   # prod backend port