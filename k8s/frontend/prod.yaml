apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: production           # production namespace
spec:
  replicas: 3                     # prod-ல 3
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: mugilan1702/multi-frontend:v1
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: production
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 32000             # prod frontend port