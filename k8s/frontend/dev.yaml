apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: dev                  # dev namespace
spec:
  replicas: 1                     # dev-ல 1 போதும்
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: mugilan1702/multi-frontend:v2
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: dev
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30000             # dev frontend port